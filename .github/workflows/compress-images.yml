name: 🔍 Debug Image Path Detection

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔍 Find all image files in repository
      run: |
        echo "🔍 모든 이미지 파일 검색 중..."
        echo "=== JPG 파일 ==="
        find . -name "*.jpg" -type f | head -20
        echo "=== JPEG 파일 ==="
        find . -name "*.jpeg" -type f | head -20
        echo "=== PNG 파일 ==="
        find . -name "*.png" -type f | head -20
        echo "=== WebP 파일 ==="
        find . -name "*.webp" -type f | head -20
        
    - name: 📊 Check recent commits for image changes
      run: |
        echo "🔍 최근 커밋에서 이미지 변경사항 확인..."
        git log --name-only --oneline -5 | grep -E '\.(jpg|jpeg|png|webp)$' || echo "최근 5개 커밋에 이미지 변경사항 없음"
        
    - name: 📋 Get changed files (current detection)
      id: changed-files
      uses: tj-actions/changed-files@v35
      with:
        files: |
          static/img/uploads/**/*.jpg
          static/img/uploads/**/*.jpeg
          static/img/uploads/**/*.png
        files_ignore: |
          static/img/uploads/**/*.webp
    
    - name: 📊 Show detection results
      run: |
        echo "🔍 변경된 파일 감지 결과:"
        echo "any_changed: ${{ steps.changed-files.outputs.any_changed }}"
        echo "all_changed_files: ${{ steps.changed-files.outputs.all_changed_files }}"
        
    - name: 🔍 Alternative: Detect ALL image changes
      id: all-images
      uses: tj-actions/changed-files@v35
      with:
        files: |
          **/*.jpg
          **/*.jpeg
          **/*.png
        files_ignore: |
          **/*.webp
    
    - name: 📊 Show alternative detection results
      run: |
        echo "🔍 전체 경로 이미지 감지 결과:"
        echo "any_changed: ${{ steps.all-images.outputs.any_changed }}"
        echo "all_changed_files: ${{ steps.all-images.outputs.all_changed_files }}"